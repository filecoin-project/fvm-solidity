[profile.default]
src = 'src'
test = 'test'
script = 'script'
out = 'out'
libs = ['lib']
cache_path = 'cache'
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true

ignored_error_codes = [
    2519, # shadowed declarations
    3628, # https://github.com/argotorg/solidity/issues/10159
]

# For dependencies
remappings = [
]

[lint]
exclude_lints = [
    "mixed-case-function",
    "unsafe-typecast",
]
